<div class="page">
  <h2>{{ 'register.hello' | translate }} {{name}}</h2>
  <form #registerForm="ngForm">
    <label for="email">{{ 'base.email' | translate }}: </label>
    <input type="email" id="email" disabled value="{{email}}">
    <label for="username">{{ 'base.username' | translate }}: </label>
    <input type="text" id="username" name="username" placeholder="{{ 'base.username' | translate }}" ngModel required>
    <label for="password">{{ 'base.password' | translate }}: </label>
    <input type="password" id="password" name="password" placeholder="{{ 'base.password' | translate }}" ngModel required>
    <label for="confirmPassword">{{ 'register.repeat-password' | translate }}: </label>
    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="{{ 'base.password' | translate }}" ngModel required>
    <submit-button text="{{ 'register.button' | translate }}" [action]="registerAction"/>
  </form>
</div>
