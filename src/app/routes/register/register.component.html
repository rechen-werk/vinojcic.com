<div class="container">
  <h2>Hello {{name}}</h2>
  <form (ngSubmit)="register($event)" #registerForm="ngForm">
    <label for="email">E-Mail: </label>
    <input type="email" id="email" disabled value="{{email}}">
    <label for="username">Username: </label>
    <input type="text" id="username" name="username" placeholder="Name" ngModel required>
    <label for="password">Password: </label>
    <input type="password" id="password" name="password" placeholder="Password" ngModel required>
    <label for="confirmPassword">Repeat Password: </label>
    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Password" ngModel required>
    <input type="submit" class="submit" *ngIf="!inProgress" value="Sign up">
    <div class="spinner-container" *ngIf="inProgress">
      <div class="spinner"></div>
    </div>
  </form>
  <div class="message-container">
    <div class="error-message" *ngIf="errorMessage !== null" [@fadeInOut]>{{errorMessage}}</div>
    <div class="success-message" *ngIf="successMessage !== null" [@fadeInOut]>{{successMessage}}</div>
  </div>
</div>
