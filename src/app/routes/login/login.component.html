<div class="page">
  <h1>{{ 'login.title' | translate }}</h1>
  <form #loginForm="ngForm">
    <label for="username">Username: </label>
    <input type="text" id="username" name="username" placeholder="Username" ngModel required>
    <label for="password">Password: </label>
    <input type="password" id="password" name="password" placeholder="Password" ngModel required>
    <submit-button text="Log in" [action]="loginAction"/>
  </form>
</div>
