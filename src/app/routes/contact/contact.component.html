<div class="page">
  <h1>Contact Me</h1>
  <p>Feel free to get in touch!</p>
  <form #contactForm="ngForm">
    <label for="name">Who is asking: </label>
    <input type="text" id="name" name="name" placeholder="Name" ngModel required>
    <label for="email">Where I may reply to: </label>
    <input type="email" id="email" name="email" placeholder="E-Mail" ngModel required>
    <label for="subject">Short summary of your message:</label>
    <input type="text" id="subject" name="subject" placeholder="Subject" ngModel>
    <label for="message">What you want to tell me:</label>
    <textarea id="message" name="message" placeholder="Hello Adrian, ..." ngModel required></textarea>
    <submit-button text="Submit" [action]="sendAction"/>
  </form>
  @if (showSuccessMessage) {
    <div class="success-message" [@fadeInOut]>Thank you for your message! We will get back to you shortly.</div>
  }
  @if (showErrorMessage) {
    <div class="error-message" [@fadeInOut]>Oops, something went wrong. Please try again later.</div>
  }
  <p>Or, send me an E-mail like in the old days to <a href="mailto:adrian.vinojcic@gmail.com">adrian.vinojcic&#64;gmail.com</a>.
  </p>
</div>
